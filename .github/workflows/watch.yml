name: TheWatcher

on:
  schedule:
    - cron: '5,20,35,50 * * * *'
  workflow_dispatch:
    inputs:
      test_notify:
        description: '發送測試通知到手機'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run all watchers
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python the_watcher.py

      - name: Send test notification
        if: ${{ inputs.test_notify == true }}
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          python - <<'EOF'
          import os, requests, json
          topic = os.environ["NTFY_TOPIC"]
          payload = {"topic": topic, "title": "TheWatcher 測試通知", "message": "Funbox + 玩具反斗城 + M.M小舖整合監控排程正常！", "priority": 4, "tags": ["white_check_mark"]}
          r = requests.post("https://ntfy.sh", data=json.dumps(payload).encode(), timeout=10)
          print(f"ntfy HTTP {r.status_code}")
          EOF

      - name: Commit state files back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add funbox_tracked_items.json toysrus_tracked_items.json mmtoyshop_tracked_items.json funbox_feed.json toysrus_feed.json mmtoyshop_feed.json feed.json funbox_history.jsonl toysrus_history.jsonl mmtoyshop_history.jsonl history.jsonl
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: update combined state [skip ci]" && git push
