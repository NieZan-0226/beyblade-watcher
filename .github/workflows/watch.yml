name: Beyblade Watcher

on:
  schedule:
    - cron: '5,20,35,50 * * * *'   # 每 15 分鐘，偏移 5 分避開整點
  workflow_dispatch:                 # 手動觸發

permissions:
  contents: write                    # 允許 commit 回寫狀態檔

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watcher
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python beyblade_watcher.py

      - name: Commit state files back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tracked_items.json feed.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: update state [skip ci]" && git push
