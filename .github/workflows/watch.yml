name: TheWatcher

on:
  schedule:
    - cron: '5,20,35,50 * * * *'
  workflow_dispatch:
    inputs:
      test_notify:
        description: '發送測試通知到手機'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: the-watcher-main
  cancel-in-progress: true

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run all watchers
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_MENTION: ${{ secrets.DISCORD_MENTION }}
        run: python the_watcher.py

      - name: Send test notification
        if: ${{ inputs.test_notify == true }}
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          python - <<'EOF'
          import os, requests, json
          topic = os.environ["NTFY_TOPIC"]
          payload = {"topic": topic, "title": "TheWatcher 測試通知", "message": "Funbox + 玩具反斗城 + 誠品線上 + 森森文具玩具 + 孩子玩伴 + MOMO 墊腳石 + MOMO Funbox 整合監控排程正常！", "priority": 4, "tags": ["white_check_mark"]}
          r = requests.post("https://ntfy.sh", data=json.dumps(payload).encode(), timeout=10)
          print(f"ntfy HTTP {r.status_code}")
          EOF

      - name: Commit state files back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git pull --rebase --autostash origin main || true
          git add funbox_tracked_items.json toysrus_tracked_items.json eslite_tracked_items.json sensen_tracked_items.json kidplaymate_tracked_items.json momo_tracked_items.json momo_funbox_tracked_items.json funbox_feed.json toysrus_feed.json eslite_feed.json sensen_feed.json kidplaymate_feed.json momo_feed.json momo_funbox_feed.json feed.json funbox_history.jsonl toysrus_history.jsonl eslite_history.jsonl sensen_history.jsonl kidplaymate_history.jsonl momo_history.jsonl momo_funbox_history.jsonl history.jsonl

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update combined state [skip ci]"

          if git push; then
            echo "State files pushed"
            exit 0
          fi

          echo "Initial push failed; rebasing and retrying once..."
          if git pull --rebase --autostash origin main && git push; then
            echo "State files pushed after rebase"
            exit 0
          fi

          echo "::warning::Watcher completed, but state files could not be pushed back to the repository."
          exit 0
