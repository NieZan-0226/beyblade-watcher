<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Beyblade Watcher｜上架・補貨看板</title>
<meta name="theme-color" content="#0a0d14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="陀螺看板">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0d14;
    --bg2:#11161f;
    --card:#161c27;
    --card2:#1c2433;
    --line:#27303f;
    --txt:#e8edf4;
    --muted:#8a98ad;
    --orange:#ff5e2b;
    --orange-d:#e0441a;
    --cyan:#27e3d0;
    --gold:#ffc24b;
    --danger:#ff5470;
    --green:#36d399;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--txt);
    font-family:"Noto Sans TC",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{
    min-height:100vh;
    background:
      radial-gradient(1100px 480px at 78% -8%, rgba(255,94,43,.16), transparent 60%),
      radial-gradient(900px 460px at 10% 4%, rgba(39,227,208,.10), transparent 55%),
      linear-gradient(180deg,var(--bg),var(--bg2));
    background-attachment:fixed;
  }
  .wrap{max-width:880px;margin:0 auto;
    padding:calc(26px + env(safe-area-inset-top,0px)) 18px calc(64px + env(safe-area-inset-bottom,0px))}

  /* header */
  header{display:flex;align-items:center;gap:14px;margin-bottom:6px}
  .bey{width:46px;height:46px;flex:none;position:relative;animation:spin 3.4s linear infinite}
  .bey::before,.bey::after{content:"";position:absolute;inset:0;border-radius:50%}
  .bey::before{background:conic-gradient(from 0deg,var(--orange),var(--gold),var(--cyan),var(--orange));
    -webkit-mask:radial-gradient(transparent 38%,#000 40%);mask:radial-gradient(transparent 38%,#000 40%)}
  .bey::after{inset:34%;background:var(--txt);box-shadow:0 0 12px rgba(255,194,75,.6)}
  @keyframes spin{to{transform:rotate(360deg)}}
  h1{font-family:"Chakra Petch",sans-serif;font-weight:700;font-size:25px;letter-spacing:.5px;line-height:1}
  h1 span{color:var(--orange)}
  .sub{color:var(--muted);font-size:12.5px;margin-top:5px;letter-spacing:.3px}

  .bar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin:18px 0 22px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:11px;
    padding:9px 13px;font-size:12.5px;color:var(--muted);display:flex;gap:7px;align-items:center}
  .stat b{color:var(--txt);font-family:"Chakra Petch",sans-serif;font-size:14px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
  .refresh{margin-left:auto;background:var(--card2);border:1px solid var(--line);color:var(--txt);
    font:inherit;font-size:12.5px;padding:9px 14px;border-radius:11px;cursor:pointer;transition:.15s}
  .refresh:hover{border-color:var(--orange);color:var(--orange)}

  .preview-note{background:rgba(255,194,75,.10);border:1px solid rgba(255,194,75,.3);
    color:var(--gold);border-radius:11px;padding:11px 14px;font-size:12.5px;margin-bottom:18px;display:none}

  /* grid */
  .grid{display:grid;grid-template-columns:1fr;gap:13px}
  @media(min-width:620px){.grid{grid-template-columns:1fr 1fr}}

  .card{position:relative;display:flex;flex-direction:column;
    background:linear-gradient(150deg,var(--card),var(--card2));
    border:1px solid var(--line);border-radius:15px;padding:17px 17px 15px 21px;overflow:hidden;
    opacity:0;transform:translateY(10px);animation:rise .5s forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--line)}
  .card.new::before{background:linear-gradient(var(--orange),var(--gold))}
  .card.restock::before{background:linear-gradient(var(--cyan),var(--green))}
  .card.soldout{opacity:.62}

  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:9px;min-height:20px}
  .badge{font-family:"Chakra Petch",sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.6px;
    padding:3px 9px;border-radius:999px;text-transform:uppercase}
  .b-new{background:var(--orange);color:#1a0b06}
  .b-restock{background:var(--cyan);color:#04201d}
  .b-instock{background:rgba(54,211,153,.15);color:var(--green);border:1px solid rgba(54,211,153,.4)}
  .b-out{background:rgba(255,84,112,.13);color:var(--danger);border:1px solid rgba(255,84,112,.4)}

  .title{font-size:15px;font-weight:500;line-height:1.45;margin-bottom:12px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:auto}
  .price{font-family:"Chakra Petch",sans-serif;font-weight:700;font-size:19px;color:var(--gold)}
  .price small{font-size:11px;color:var(--muted);font-family:"Noto Sans TC"}
  .price.na{font-size:13px;color:var(--muted);font-weight:500}
  .buy{font-family:"Chakra Petch",sans-serif;font-weight:600;font-size:12.5px;letter-spacing:.4px;
    text-decoration:none;color:#1a0b06;background:linear-gradient(135deg,var(--orange),var(--orange-d));
    padding:9px 14px;border-radius:10px;white-space:nowrap;transition:.15s;
    box-shadow:0 4px 14px rgba(255,94,43,.28)}
  .buy:hover{transform:translateY(-1px);box-shadow:0 7px 20px rgba(255,94,43,.42)}

  .empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:14px}
  footer{text-align:center;color:var(--muted);font-size:11.5px;margin-top:30px;opacity:.7}

  /* tabs */
  .tabs{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0 0}
  .tab{font-family:"Chakra Petch",sans-serif;font-weight:600;font-size:13.5px;letter-spacing:.4px;
    background:var(--card);border:1px solid var(--line);color:var(--muted);
    padding:9px 20px;border-radius:11px;cursor:pointer;transition:.15s}
  .tab:hover{color:var(--txt);border-color:var(--orange)}
  .tab.active{background:linear-gradient(135deg,var(--orange),var(--orange-d));color:#1a0b06;
    border-color:transparent;box-shadow:0 4px 14px rgba(255,94,43,.28)}
  .panel{display:none}
  .panel.active{display:block}

  /* tips videos (RWD 16:9) */
  .videos{display:flex;flex-direction:column;gap:16px;margin-top:20px}
  .video{position:relative;width:100%;aspect-ratio:16/9;border-radius:14px;overflow:hidden;
    border:1px solid var(--line);background:#000}
  .video iframe{position:absolute;inset:0;width:100%;height:100%;border:0}

  /* filters (selects / search) */
  .filter{background:var(--card2);border:1px solid var(--line);color:var(--txt);font:inherit;font-size:12.5px;
    padding:8px 12px;border-radius:10px;cursor:pointer;transition:.15s}
  .filter:focus{outline:none;border-color:var(--orange)}
  input.filter{cursor:text;flex:1 1 150px;min-width:130px}

  /* 比賽 cards */
  .ev-when{font-family:"Chakra Petch",sans-serif;font-weight:700;font-size:15px;color:var(--gold);margin-bottom:4px}
  .ev-store{font-size:14.5px;font-weight:700;margin-bottom:2px}
  .ev-tel{font-size:12px;color:var(--cyan);text-decoration:none;font-weight:500;margin-left:7px;white-space:nowrap}
  .ev-tel:hover{text-decoration:underline}
  .meta{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;margin:13px 0}
  .meta>div{display:flex;flex-direction:column;gap:2px;min-width:0}
  .meta dt{font-size:10.5px;color:var(--muted);letter-spacing:.3px}
  .meta dd{font-size:13px;color:var(--txt);font-weight:500;word-break:break-word}
  .ev-addr{display:block;margin-top:auto;font-size:12.5px;color:var(--muted);text-decoration:none;
    border-top:1px solid var(--line);padding-top:10px;line-height:1.5}
  .ev-addr:hover{color:var(--cyan)}

  /* badges (new variants) */
  .b-soon{background:rgba(39,227,208,.15);color:var(--cyan);border:1px solid rgba(39,227,208,.4)}
  .b-fmt,.b-use{background:rgba(138,152,173,.14);color:var(--muted);border:1px solid var(--line)}
  .b-sys,.b-code{background:var(--gold);color:#241a04}
  .t-atk{background:rgba(255,84,112,.16);color:var(--danger);border:1px solid rgba(255,84,112,.4)}
  .t-def{background:rgba(39,227,208,.15);color:var(--cyan);border:1px solid rgba(39,227,208,.4)}
  .t-sta{background:rgba(54,211,153,.15);color:var(--green);border:1px solid rgba(54,211,153,.4)}
  .t-bal{background:rgba(255,194,75,.15);color:var(--gold);border:1px solid rgba(255,194,75,.4)}

  /* 圖鑑 sub-tabs */
  .subtabs{display:flex;gap:7px;margin:18px 0 4px;flex-wrap:wrap}
  .subtab{font-family:"Noto Sans TC";font-size:12.5px;font-weight:600;background:transparent;
    border:1px solid var(--line);color:var(--muted);padding:7px 16px;border-radius:999px;cursor:pointer;transition:.15s}
  .subtab:hover{color:var(--txt)}
  .subtab.active{background:var(--card2);color:var(--orange);border-color:var(--orange)}
  .subpanel{display:none}
  .subpanel.active{display:block}
  .bey-name{font-size:14.5px;font-weight:500;line-height:1.45;margin-bottom:4px}
  .ax-note{font-size:12px;color:var(--muted);line-height:1.6;white-space:pre-line;margin-top:auto;
    border-top:1px solid var(--line);padding-top:10px}

  /* 固鎖 tables */
  .lock-title{font-family:"Chakra Petch",sans-serif;font-weight:700;font-size:15px;color:var(--orange);
    letter-spacing:.5px;margin:6px 0 12px}
  .lock-title.gap{margin-top:28px}
  .lock-row{display:grid;grid-template-columns:60px 1fr;gap:14px;align-items:center;
    background:linear-gradient(150deg,var(--card),var(--card2));border:1px solid var(--line);
    border-radius:12px;padding:13px 15px;margin-bottom:10px}
  .lock-key{font-family:"Chakra Petch",sans-serif;font-weight:700;font-size:21px;color:var(--gold);text-align:center}
  .lock-desc{font-size:12.5px;color:var(--txt);line-height:1.6;white-space:pre-line}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="bey" aria-hidden="true"></div>
    <div>
      <h1>BEYBLADE <span>WATCHER</span></h1>
      <div class="sub" id="source">上架・補貨即時看板</div>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="products" onclick="showTab('products')">商品</button>
    <button class="tab" data-tab="tips" onclick="showTab('tips')">技巧</button>
    <button class="tab" data-tab="events" onclick="showTab('events')">比賽</button>
    <button class="tab" data-tab="dex" onclick="showTab('dex')">圖鑑</button>
  </nav>

  <section class="panel active" id="panel-products">
    <div class="bar">
      <div class="stat"><span class="dot"></span> 共 <b id="count">–</b> 項</div>
      <div class="stat">最後更新 <b id="updated">–</b></div>
      <button class="refresh" id="refresh" onclick="load()">↻ 重新整理</button>
    </div>

    <div class="preview-note" id="preview">預覽模式:目前顯示的是範例資料(瀏覽器無法直接讀本機檔案)。掛上 GitHub Pages、或放在 feed.json 旁邊時,就會自動顯示真實資料。</div>

    <div class="grid" id="grid"></div>
  </section>

  <section class="panel" id="panel-tips">
    <div class="videos">
      <div class="video">
        <iframe src="https://www.youtube.com/embed/_el8OLeEARU" title="Beyblade 教學影片 1"
          loading="lazy" referrerpolicy="strict-origin-when-cross-origin"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen></iframe>
      </div>
      <div class="video">
        <iframe src="https://www.youtube.com/embed/bH8rDjve0CA" title="Beyblade 教學影片 2"
          loading="lazy" referrerpolicy="strict-origin-when-cross-origin"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen></iframe>
      </div>
      <div class="video">
        <iframe src="https://www.youtube.com/embed/JXJ9oDPT9ZA" title="Beyblade 教學影片 3"
          loading="lazy" referrerpolicy="strict-origin-when-cross-origin"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen></iframe>
      </div>
    </div>
  </section>

  <section class="panel" id="panel-events">
    <div class="bar">
      <div class="stat"><span class="dot"></span> 即將舉行 <b id="ev-count">–</b> 場</div>
      <select class="filter" id="ev-region" onchange="renderEvents()"><option value="">全部地區</option></select>
      <select class="filter" id="ev-store" onchange="renderEvents()"><option value="">全部店家</option></select>
    </div>
    <div class="grid" id="ev-grid"></div>
  </section>

  <section class="panel" id="panel-dex">
    <nav class="subtabs">
      <button class="subtab active" data-sub="beys" onclick="showSub('beys')">陀螺圖鑑</button>
      <button class="subtab" data-sub="axes" onclick="showSub('axes')">軸心</button>
      <button class="subtab" data-sub="locks" onclick="showSub('locks')">固鎖</button>
    </nav>

    <div class="subpanel active" id="sub-beys">
      <div class="grid" id="bey-grid"></div>
    </div>

    <div class="subpanel" id="sub-axes">
      <div class="bar">
        <div class="stat"><span class="dot"></span> <b id="ax-count">–</b> 顆軸心</div>
        <select class="filter" id="ax-type" onchange="renderAxes()"><option value="">全部類型</option></select>
        <select class="filter" id="ax-use" onchange="renderAxes()"><option value="">全部泛用度</option></select>
        <input class="filter" id="ax-search" type="search" placeholder="搜尋代號 / 備註…" oninput="renderAxes()">
      </div>
      <div class="grid" id="axis-grid"></div>
    </div>

    <div class="subpanel" id="sub-locks">
      <h3 class="lock-title">固鎖・刃</h3>
      <div id="lock-blade"></div>
      <h3 class="lock-title gap">固鎖・高度</h3>
      <div id="lock-height"></div>
    </div>
  </section>

  <footer>資料來源 feed.json・每 15 分鐘由 GitHub Actions 自動更新</footer>
</div>

<script>
  // 預覽用範例資料(讀不到 feed.json 時顯示)
  const SAMPLE = {
    updated_at: new Date().toISOString(), source: "範例資料", count: 4,
    products: [
      {id:"1",title:"BX-45 戰鬥陀螺X 對戰組 Phoenix Wing 鳳凰翼",url:"#",price:1290,in_stock:true,status:"new"},
      {id:"2",title:"BX-40 戰鬥陀螺X 強化發射器 連射型",url:"#",price:450,in_stock:true,status:"restock"},
      {id:"3",title:"BX-35 戰鬥陀螺X 起始組 Dran Buster",url:"#",price:990,in_stock:true,status:"normal"},
      {id:"4",title:"BX-23 戰鬥陀螺X APP 兌換預購限定品",url:"#",price:999999,in_stock:false,status:"normal"},
    ]
  };

  function timeAgo(iso){
    const d=new Date(iso), s=(Date.now()-d)/1000;
    if(s<90) return "剛剛";
    if(s<3600) return Math.round(s/60)+" 分鐘前";
    if(s<86400) return Math.round(s/3600)+" 小時前";
    return d.toLocaleDateString("zh-TW",{month:"numeric",day:"numeric"});
  }
  function priceHTML(p){
    if(p==null||p>=999999) return '<span class="price na">未定價 / 預購</span>';
    return '<span class="price"><small>NT$</small> '+Math.round(p).toLocaleString()+'</span>';
  }

  function render(data, isPreview){
    document.getElementById("preview").style.display = isPreview ? "block" : "none";
    document.getElementById("count").textContent = data.count ?? data.products.length;
    document.getElementById("updated").textContent = data.updated_at ? timeAgo(data.updated_at) : "–";
    document.getElementById("source").textContent = "來源:" + (data.source || "feed.json");

    const grid=document.getElementById("grid");
    if(!data.products || !data.products.length){
      grid.innerHTML='<div class="empty">目前沒有商品資料。</div>'; return;
    }
    grid.innerHTML = data.products.map((p,i)=>{
      const cls = p.status==="new"?"new" : p.status==="restock"?"restock" : "";
      const badges = [];
      if(p.status==="new") badges.push('<span class="badge b-new">★ 新上架</span>');
      if(p.status==="restock") badges.push('<span class="badge b-restock">↻ 補貨</span>');
      badges.push(p.in_stock
        ? '<span class="badge b-instock">有貨</span>'
        : '<span class="badge b-out">缺貨</span>');
      const link = (p.url && p.url!=="#") ? p.url : null;
      const buy = link
        ? '<a class="buy" href="'+link+'" target="_blank" rel="noopener">前往購買 →</a>'
        : '<span class="buy" style="opacity:.4;cursor:default;box-shadow:none">範例</span>';
      return '<div class="card '+cls+(p.in_stock?"":" soldout")+'" style="animation-delay:'+(i*55)+'ms">'
        + '<div class="badges">'+badges.join("")+'</div>'
        + '<div class="title">'+(p.title||"未命名商品")+'</div>'
        + '<div class="foot">'+priceHTML(p.price)+buy+'</div></div>';
    }).join("");
  }

  async function load(){
    const btn=document.getElementById("refresh"); btn.textContent="載入中…";
    try{
      const r = await fetch("feed.json?_="+Date.now());
      if(!r.ok) throw new Error("no feed");
      render(await r.json(), false);
    }catch(e){
      render(SAMPLE, true);   // 讀不到就顯示範例
    }
    btn.textContent="↻ 重新整理";
  }
  // 簡易 HTML 跳脫，避免資料內含特殊字元破壞版面
  function esc(s){
    return String(s==null?"":s).replace(/[&<>"']/g,c=>(
      {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  function showTab(name){
    document.querySelectorAll(".panel").forEach(p=>p.classList.toggle("active", p.id==="panel-"+name));
    document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active", t.dataset.tab===name));
    if(name==="events") renderEvents();
    if(name==="dex") renderDex();
  }

  /* ============ 比賽 ============ */
  let EVENTS = null;
  function localToday(){
    const d=new Date();
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  }
  function daysUntil(dateStr){
    const a=new Date(localToday()+"T00:00:00"), b=new Date(dateStr+"T00:00:00");
    return Math.round((b-a)/86400000);
  }
  function regionOf(addr){ const m=(addr||"").match(/^(..[市縣])/); return m?m[1]:"其他"; }

  async function renderEvents(){
    const grid=document.getElementById("ev-grid");
    if(!EVENTS){
      try{
        const r=await fetch("events.json?_="+Date.now());
        if(!r.ok) throw new Error("no events");
        EVENTS=(await r.json()).events||[];
      }catch(e){ grid.innerHTML='<div class="empty">讀不到 events.json。</div>'; return; }
      buildEventFilters();
    }
    const today=localToday();
    const fr=document.getElementById("ev-region").value;
    const fs=document.getElementById("ev-store").value;
    const list=EVENTS
      .filter(e=>e.date>=today)
      .filter(e=>!fr || regionOf(e.address)===fr)
      .filter(e=>!fs || e.store===fs)
      .sort((a,b)=> a.date===b.date ? (a.time||"").localeCompare(b.time||"") : a.date.localeCompare(b.date));
    document.getElementById("ev-count").textContent=list.length;
    if(!list.length){ grid.innerHTML='<div class="empty">目前沒有即將到來的比賽。</div>'; return; }
    grid.innerHTML=list.map((e,i)=>{
      const n=daysUntil(e.date);
      const tag = n<=0
        ? '<span class="badge b-new">今日</span>'
        : '<span class="badge b-soon">還有 '+n+' 天</span>';
      const md=e.date.slice(5).replace("-","/");
      const maps="https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(e.address||"");
      const tel = e.phone ? ' <a class="ev-tel" href="tel:'+esc(e.phone)+'">'+esc(e.phone)+'</a>' : '';
      return '<div class="card'+(n<=0?" new":"")+'" style="animation-delay:'+(i*40)+'ms">'
        + '<div class="badges">'+tag+'<span class="badge b-fmt">'+esc(e.format||"")+'</span></div>'
        + '<div class="ev-when">'+md+' '+esc(e.weekday||"")+' · '+esc(e.time||"")+'</div>'
        + '<div class="ev-store">'+esc(e.store||"")+tel+'</div>'
        + '<dl class="meta">'
          + '<div><dt>賽制</dt><dd>'+esc(e.format||"-")+'</dd></div>'
          + '<div><dt>報名方式</dt><dd>'+esc(e.signup||"-")+'</dd></div>'
          + '<div><dt>人數上限</dt><dd>'+(e.capacity!=null?esc(e.capacity)+" 人":"-")+'</dd></div>'
        + '</dl>'
        + '<a class="ev-addr" href="'+maps+'" target="_blank" rel="noopener">📍 '+esc(e.address||"無地址")+'</a>'
        + '</div>';
    }).join("");
  }

  function buildEventFilters(){
    const today=localToday();
    const upcoming=EVENTS.filter(e=>e.date>=today);
    const regions=[...new Set(upcoming.map(e=>regionOf(e.address)))].sort();
    const stores=[...new Set(upcoming.map(e=>e.store).filter(Boolean))].sort();
    const fill=(sel,arr)=>{ arr.forEach(v=>{
      const o=document.createElement("option"); o.value=v; o.textContent=v; sel.appendChild(o);
    }); };
    fill(document.getElementById("ev-region"), regions);
    fill(document.getElementById("ev-store"), stores);
  }

  /* ============ 圖鑑 ============ */
  let DEX = null;
  function showSub(name){
    document.querySelectorAll("#panel-dex .subpanel").forEach(p=>p.classList.toggle("active", p.id==="sub-"+name));
    document.querySelectorAll("#panel-dex .subtab").forEach(t=>t.classList.toggle("active", t.dataset.sub===name));
  }
  async function renderDex(){
    if(DEX) return;
    try{
      const r=await fetch("parts.json?_="+Date.now());
      if(!r.ok) throw new Error("no parts");
      DEX=await r.json();
    }catch(e){
      document.getElementById("bey-grid").innerHTML='<div class="empty">讀不到 parts.json。</div>';
      return;
    }
    renderBeys();
    buildAxisFilters();
    renderAxes();
    renderLocks();
  }

  function renderBeys(){
    const list=DEX["陀螺圖鑑"]||[];
    document.getElementById("bey-grid").innerHTML=list.map((b,i)=>{
      const id=esc(b["系統"]||"")+"-"+esc(b["編號"]||"")+(b["副號"]?("·"+esc(b["副號"])):"");
      return '<div class="card" style="animation-delay:'+(i*22)+'ms">'
        + '<div class="badges"><span class="badge b-sys">'+id+'</span></div>'
        + '<div class="bey-name">'+esc(b["名稱"]||"未命名")+'</div>'
        + '<dl class="meta">'
          + '<div><dt>固鎖</dt><dd>'+esc(b["固鎖"]||"-")+'</dd></div>'
          + '<div><dt>軸心</dt><dd>'+esc(b["軸心"]||"-")+'</dd></div>'
        + '</dl></div>';
    }).join("");
  }

  function buildAxisFilters(){
    const ax=DEX["軸心"]||[];
    const types=[...new Set(ax.map(a=>a["類型"]).filter(Boolean))];
    const uses=[...new Set(ax.map(a=>a["泛用度"]).filter(Boolean))];
    const fill=(sel,arr)=>arr.forEach(v=>{
      const o=document.createElement("option"); o.value=v; o.textContent=v; sel.appendChild(o);
    });
    fill(document.getElementById("ax-type"), types);
    fill(document.getElementById("ax-use"), uses);
  }

  function renderAxes(){
    const ax=DEX["軸心"]||[];
    const ft=document.getElementById("ax-type").value;
    const fu=document.getElementById("ax-use").value;
    const q=document.getElementById("ax-search").value.trim().toLowerCase();
    const typeCls={"攻擊":"t-atk","防禦":"t-def","持久":"t-sta","平衡":"t-bal"};
    const list=ax.filter(a=>
      (!ft || a["類型"]===ft) &&
      (!fu || a["泛用度"]===fu) &&
      (!q || (a["軸心"]+" "+a["備註"]+" "+a["軸端"]+" "+a["射法"]).toLowerCase().includes(q)));
    document.getElementById("ax-count").textContent=list.length;
    const g=document.getElementById("axis-grid");
    if(!list.length){ g.innerHTML='<div class="empty">沒有符合條件的軸心。</div>'; return; }
    g.innerHTML=list.map((a,i)=>(
      '<div class="card" style="animation-delay:'+(i*22)+'ms">'
      + '<div class="badges">'
        + '<span class="badge b-code">'+esc(a["軸心"]||"?")+'</span>'
        + '<span class="badge '+(typeCls[a["類型"]]||"")+'">'+esc(a["類型"]||"")+'</span>'
        + '<span class="badge b-use">'+esc(a["泛用度"]||"")+'</span>'
      + '</div>'
      + '<dl class="meta">'
        + '<div><dt>軸端</dt><dd>'+esc(a["軸端"]||"-")+'</dd></div>'
        + '<div><dt>齒數</dt><dd>'+esc(a["齒數"]||"-")+'</dd></div>'
        + '<div><dt>高度</dt><dd>'+esc(a["高度"]||"-")+'</dd></div>'
        + '<div><dt>射法</dt><dd>'+esc(a["射法"]||"-")+'</dd></div>'
      + '</dl>'
      + (a["備註"]?'<p class="ax-note">'+esc(a["備註"])+'</p>':"")
      + '</div>'
    )).join("");
  }

  function renderLocks(){
    const row=x=>(k,d)=>'<div class="lock-row"><div class="lock-key">'+esc(x[k])+'</div>'
      +'<div class="lock-desc">'+esc(x[d])+'</div></div>';
    document.getElementById("lock-blade").innerHTML=
      (DEX["固鎖_刃"]||[]).map(x=>row(x)("刃","說明")).join("");
    document.getElementById("lock-height").innerHTML=
      (DEX["固鎖_高度"]||[]).map(x=>row(x)("高度","說明")).join("");
  }

  load();
  setInterval(load, 5*60*1000);  // 每 5 分鐘自動更新一次
</script>
</body>
</html>
